<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" media="only screen and (max-width: 400px)" href="game-style-mobile.css" />
    <link rel="stylesheet" media="only screen and (min-width: 401px)" href="game-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Collected</title>
</head>
<body>
    <div id="console" class="boxed">
        <div id="bandaid"></div>
        <!--- If you rename the claw machine, be sure to also copy that name over to the results.html page too -->
        <div id="banner">CLAW GAME</div>
        <div id="collect-window">
            <h2 id="prize_0" class="collected-item">FROGS ☐</h2>
            <h2 id="prize_1" class="collected-item">PENGUINS ☐</h2>
            <h2 id="prize_2" class="collected-item">RACCOONS ☐</h2>
            <h2 id="prize_3" class="collected-item">POLAR BEARS ☐</h2>
            <h2 id="prize_4" class="collected-item">SALMON & FRIEND ☐</h2>
            <h2 id="impossible" class="collected-item">SECRET ANIMAL ☐</h2>
        </div>
        <div>
            <div class="btn boxed" id="give-up">GIVE UP</div>
            <div class="btn boxed" id="play-again">PLAY AGAIN</div>
        </div>
    </div>
</body>
<script src="collected.js"></script>
</html>
